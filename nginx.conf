server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Entry points — never cache (these bootstrap the app)
    location ~ ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|version\.json|manifest\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        add_header Cloudflare-CDN-Cache-Control "no-store";
        try_files $uri =404;
    }

    # Static assets with hashed filenames — long cache
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # JS/JSON in subdirectories (canvaskit, assets) — long cache (hashed)
    location ~* ^/(canvaskit|assets)/.+\.(js|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # App Links verification files — must NOT fall back to index.html
    location /.well-known/ {
        add_header Content-Type application/json;
        try_files $uri =404;
    }

    # Everything else falls back to index.html (hash routing)
    location / {
        try_files $uri /index.html;
    }
}
