server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web assets — long cache for hashed files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else falls back to index.html (hash routing)
    location / {
        try_files $uri /index.html;
    }
}
