# No "version" field — it's deprecated in modern Docker Compose

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: macromicro
      POSTGRES_USER: fushi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # Health check ensures dependent services wait for Postgres to be READY,
    # not just started. Without this, the API might crash on startup because
    # Postgres isn't accepting connections yet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fushi -d macromicro"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # No "ports" — Postgres is only accessible from within the Docker network.
    # This means no one can connect to it from outside, even on the LAN.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    # IMPORTANT: Pin to a specific version. Meilisearch has had breaking changes
    # between majors that require full re-indexing. Using "latest" means a random
    # docker pull could destroy your search index.
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://fushi:${POSTGRES_PASSWORD}@postgres:5432/macromicro
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_MASTER_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      NODE_ENV: production
    volumes:
      - ./static:/app/static:ro
      - ./static/uploads:/app/static/uploads:rw
    ports:
      # Exposed to localhost so Cloudflare Tunnel can reach it.
      # The tunnel config points to http://localhost:3000.
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    # Log rotation — prevents container logs from eating all your disk space
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  meili_data:

networks:
  internal:
    driver: bridge
